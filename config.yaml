# ── Tokenizer ───────────────────────────────────────────────────────────────
tokenizer:
  source: huggingface
  huggingface_model: Xenova/claude-tokenizer
  vocab_size: 128000
  max_samples: 100000
  type: bpe
  force: false
  add_prefix_space: false
  add_bos_token: true
  add_eos_token: true

# ── Output & Logging ────────────────────────────────────────────────────────
output:
  model_dir: ./models/fable5
  data_dir: ./data
  checkpoint_dir: ./models/fable5/checkpoints
  log_dir: ./logs
  experiment_tracking:
    enabled: false
    provider: none
    project: fable-5


