# =============================================================================
# NSLT Configuration — Neural-State Liquid Transformer
# Replaces dense transformers with O(1) SSM compression + liquid ODE routing
# + parallel latent sandbox reasoning + ultra-sparse (1%) output.
# =============================================================================
project:
  name: NSLT-Zero
  seed: 42
  deterministic: true

# ── Model Architecture ──────────────────────────────────────────────────────
# Neural-State Liquid Transformer (NSLT) — a non-Transformer architecture.
# Layer 1: SSM Neural Compression (O(1) memory via structured state-space)
# Layer 2: LTC Routing (continuous ODE with liquid time-constants)
# Layer 3: Latent Sandbox (energy-based parallel vector reasoning)
# Layer 4: Ultra-Sparse Output Synthesizer (top-1% vocabulary gating)
model:
  name: NSLT-Zero
  dtype: bfloat16
  device: auto
  train_from_scratch: true
  load_in_8bit: false
  load_in_4bit: false
  architecture:
    model_type: nslt
    vocab_size: 128000
    hidden_size: 10240          # d_model — embedding dimension (scaled for 4x A100 80GB)

    # NSLT-specific parameters (read by schema.ModelArchitectureConfig.nslt)
    nslt:
      d_state: 4096
      d_hidden: 10240
      n_ssm_layers: 12          # Stacked SSM blocks for hierarchical compression
      n_ode_steps: 8            # RK4 integration steps in LTC layer
      solver: rk4
      n_trajectories: 8         # K parallel trajectories in Latent Sandbox
      n_sim_steps: 16           # Energy descent steps per forward pass
      use_efficient_sandbox: true
      sparsity_pct: 1.0         # Top-1% vocabulary per token

    # Position encoding — RoPE with 10M theta for long context
    max_position_embeddings: 16384
    rope_theta: 10000000.0
    rope_scaling:
      type: yarn
      factor: 16.0
      target_max_length: 262144
      original_max_position_embeddings: 16384

# ── Training ────────────────────────────────────────────────────────────────
# Pure training: Pretrain → SFT → Instruction Tuning (no eval, no alignment, no safety)
training:
  max_seq_length: 4096
  response_only_loss: true
  ignore_data_skip: true
  save_steps: 1000
  save_total_limit: 5
  eval_strategy: "no"
  logging_steps: 10

  # Stage 1: Pretraining (500K steps, cosine LR, LR=2e-4)
  # 4 GPUs: per_device=2, gas=8 → effective batch = 2 × 4 × 8 = 64
  pretrain:
    enabled: true
    learning_rate: 2e-4
    lr_scheduler_type: cosine
    warmup_steps: 5000
    weight_decay: 0.1
    batch_size: 2
    gradient_accumulation_steps: 8
    max_steps: 500000
    optimizer: adamw_fused
    data_mix:
      code: 0.3
      web_text: 0.3
      books: 0.1
      math: 0.1
      science: 0.1
      other: 0.1

  # Stage 2: Supervised Fine-Tuning (50K steps, LR=5e-6)
  # 4 GPUs: per_device=1, gas=4 → effective batch = 1 × 4 × 4 = 16
  sft:
    enabled: true
    learning_rate: 5e-6
    lr_scheduler_type: cosine
    warmup_steps: 500
    weight_decay: 0.05
    batch_size: 1
    gradient_accumulation_steps: 4
    max_steps: 50000
    optimizer: adamw_fused
    data_mix:
      sft_instructions: 0.5
      conversations: 0.3
      code_tasks: 0.2

  # Stage 3: Instruction Tuning (20K steps)
  # 4 GPUs: per_device=1, gas=4 → effective batch = 1 × 4 × 4 = 16
  instruction_tuning:
    enabled: true
    learning_rate: 1e-5
    batch_size: 1
    gradient_accumulation_steps: 4
    max_steps: 20000
    warmup_steps: 200

  # Alignment & Safety disabled — pure training only
  alignment:
    enabled: false
  safety:
    enabled: false

# ── Distributed Training (FSDP) ─────────────────────────────────────────────
# 4x A100 80GB → use FSDP full shard (no offload needed)
distributed:
  strategy: fsdp
  fsdp:
    enabled: true
    sharding_strategy: full_shard
    transformer_layer_cls: NSLTModel
    backward_prefetch: backward_pre
    forward_prefetch: true
    activation_checkpointing: true
    use_orig_params: true
    sync_module_states: true
    limit_all_gathers: true
    mixed_precision: bf16

# ── Data ────────────────────────────────────────────────────────────────────
data:
  cache_dir: ./hf_cache
  streaming: true
  max_cache_gb: 200
  num_download_workers: 16

  quality:
    min_length: 30
    max_length: 500000
    deduplication:
      enabled: true
      method: minhash
      threshold: 0.85
    contamination:
      enabled: true
      benchmarks: [human_eval, mbpp, mmlu, gsm8k, arc, hellaswag, truthfulqa]
    quality_scoring:
      enabled: true
      method: heuristic
    language_detection:
      enabled: true
    toxicity_filtering:
      enabled: true

  curriculum:
    enabled: false
    stages:
      - name: core
        weight: 0.2
      - name: ai
        weight: 0.4
      - name: agentic
        weight: 0.4

